<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#07101f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prezen">
<meta name="application-name" content="Prezen">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
<title>Presentation｜奈良文化高等学校</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;width:100%;height:100%;overflow:hidden;
  font-family:"Yu Gothic","Hiragino Sans","Noto Sans JP",sans-serif;
  background:
    linear-gradient(135deg,rgba(5,8,15,.78),rgba(7,16,31,.70)),
    url("https://sumida-passion.github.io/game-assets/images/hpmain.jpg") center center/cover no-repeat;
  color:#fff8ea;
  touch-action:manipulation;
  overscroll-behavior:none;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
}
body::before{
  content:"";position:fixed;inset:0;opacity:.07;pointer-events:none;
  background-image:linear-gradient(90deg,rgba(255,255,255,.18) 1px,transparent 1px),
                   linear-gradient(rgba(255,255,255,.14) 1px,transparent 1px);
  background-size:42px 42px;
}
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(circle at 18% 78%,rgba(213,162,74,.20),transparent 32%),
    linear-gradient(0deg,rgba(5,8,15,.56),rgba(5,8,15,.12) 50%,rgba(5,8,15,.50));
}
#menu{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  padding:42px;z-index:10;
}
.menu-card{
  position:relative;z-index:2;
  width:min(1050px,92vw);height:min(620px,82vh);
  border-radius:34px;padding:56px;
  background:linear-gradient(135deg,rgba(255,248,234,.12),rgba(255,248,234,.05));
  border:1px solid rgba(213,162,74,.34);
  box-shadow:0 30px 90px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.06);
  display:flex;flex-direction:column;justify-content:center;
  backdrop-filter:blur(2px);
}
.kicker{color:#f2c978;font-weight:950;letter-spacing:.16em;font-size:1.1rem;margin-bottom:18px}
h1{font-size:clamp(3.3rem,7vw,6.6rem);line-height:1.05;margin:0 0 18px;font-weight:950;letter-spacing:.04em}
.sub{font-size:clamp(1.2rem,2vw,1.75rem);line-height:1.6;color:rgba(255,248,234,.86);font-weight:850;margin-bottom:42px}
.buttons{display:grid;grid-template-columns:1fr 1fr;gap:20px}
a.button{
  display:flex;align-items:center;justify-content:center;text-decoration:none;
  border-radius:999px;padding:22px 28px;
  font-size:clamp(1.25rem,2vw,1.8rem);font-weight:950;
  color:#111827;background:#f2c978;box-shadow:0 18px 34px rgba(0,0,0,.28);
  touch-action:manipulation;
}
a.button.secondary{background:rgba(255,248,234,.12);color:#fff8ea;border:1px solid rgba(242,201,120,.36)}
@media(max-width:900px){.buttons{grid-template-columns:1fr}.menu-card{padding:34px}}
</style>
</head>
<body>
<section id="menu">
  <div class="menu-card">
    <div class="kicker">NARA BUNKA HIGH SCHOOL</div>
    <h1>Presentation</h1>
    <div class="sub">探究説明から学校紹介まで、<br>ひとつのプレゼンテーションでつなぐ。</div>
    <div class="buttons">
      <a class="button" href="./tankyu2.html">探究説明から始める</a>
      <a class="button secondary" href="./syokai.html">学校全体図から始める</a>
    </div>
  </div>
</section>
<script>
/* iPad PWA presentation guard */
(function(){
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function(e){
    const now = Date.now();
    if(now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, {passive:false});
  document.addEventListener('gesturestart', e=>e.preventDefault(), {passive:false});
  document.addEventListener('gesturechange', e=>e.preventDefault(), {passive:false});
  document.addEventListener('gestureend', e=>e.preventDefault(), {passive:false});
  document.addEventListener('contextmenu', e=>e.preventDefault());
})();
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
</body>
</html>
